name: Deploy Backend → Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies to .packages
        run: pip install -r requirements.txt --target .packages

      - name: Package app
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude "venv/*" \
            --exclude "*.db" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          az webapp deploy \
            --name bora-floripa-api \
            --resource-group rg-borafloripa \
            --src-path deploy.zip \
            --type zip \
            --restart true

      - name: Set startup command
        run: |
          az webapp config set \
            --name bora-floripa-api \
            --resource-group rg-borafloripa \
            --startup-file "bash /home/site/wwwroot/startup.sh"
