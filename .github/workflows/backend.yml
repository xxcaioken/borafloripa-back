name: Deploy Backend → Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Package source
        run: |
          zip -r deploy.zip . \
            --exclude ".git/*" \
            --exclude "venv/*" \
            --exclude "*.db" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: bora-floripa-api
          package: deploy.zip
          startup-command: 'bash /home/site/wwwroot/startup.sh'
